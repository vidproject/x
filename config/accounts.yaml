# Authoritative list of accounts the archive tracks.
# The Firefox extension fetches this file from the configured repo at startup
# and filters captured GraphQL payloads to tweets authored by these handles.
accounts:
  - handle: DHSgov
    label: Department of Homeland Security
  - handle: ICEgov
    label: U.S. Immigration and Customs Enforcement
  - handle: CBP
    label: U.S. Customs and Border Protection
  - handle: USCIS
    label: U.S. Citizenship and Immigration Services
  - handle: WhiteHouse
    label: The White House
  - handle: PressSec
    label: White House Press Secretary
  - handle: POTUS
    label: President of the United States
  - handle: USDOL
    label: U.S. Department of Labor
