name: archive-media
on:
  # Run after every ingest commit so newly observed media gets pulled
  # before twimg expires the original URL.
  workflow_run:
    workflows: ['ingest']
    types: [completed]
  # And on a fallback schedule so manually-dropped raw files still get
  # picked up if the ingest workflow didn't fire (e.g. weekend lull).
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches: [master]
    paths:
      - '.github/workflows/archive-media.yml'
      - 'data/tags/core_produced_missing_tweet_ids.txt'
      - 'data/tags/core_produced_missing_media_ids.txt'
  workflow_dispatch:
    inputs:
      handle:
        description: 'Restrict to one handle (optional)'
        required: false
      tweet_ids_file:
        description: 'Restrict archive step to tweet IDs listed in this repo file (optional)'
        required: false
      media_ids_file:
        description: 'Restrict archive step to media IDs listed in this repo file (optional)'
        required: false
      max_items:
        description: 'Max uncached items to process per analyzer step'
        required: false
        default: '80'
      llm_max_items:
        description: 'Max uncached media items to send to OpenAI vision'
        required: false
        default: '20'
      llm_budget_usd:
        description: 'Approximate budget cap for paid vision calls'
        required: false
        default: '2.00'

permissions:
  contents: write

concurrency:
  group: archive-media
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Skip when the upstream ingest run failed — no fresh data to chase.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: install python deps
        run: uv sync

      - name: install media analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr ffmpeg

      - name: archive media
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          args=()
          max_items="${{ inputs.max_items }}"
          if [ -z "$max_items" ]; then
            max_items="80"
          fi
          if [ -n "${{ inputs.handle }}" ]; then
            args+=(--handle "${{ inputs.handle }}")
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ -f data/tags/core_produced_missing_tweet_ids.txt ]; then
              args+=(--tweet-ids-file data/tags/core_produced_missing_tweet_ids.txt)
            fi
            if [ -f data/tags/core_produced_missing_media_ids.txt ]; then
              args+=(--media-ids-file data/tags/core_produced_missing_media_ids.txt)
            fi
          fi
          if [ -n "${{ inputs.tweet_ids_file }}" ]; then
            args+=(--tweet-ids-file "${{ inputs.tweet_ids_file }}")
          fi
          if [ -n "${{ inputs.media_ids_file }}" ]; then
            args+=(--media-ids-file "${{ inputs.media_ids_file }}")
          fi
          args+=(--max-items "$max_items")
          uv run python -m scripts.archive_media "${args[@]}"

      - name: describe archived media
        timeout-minutes: 10
        run: |
          args=()
          max_items="${{ inputs.max_items }}"
          if [ -z "$max_items" ]; then
            max_items="80"
          fi
          if [ -n "${{ inputs.handle }}" ]; then
            args+=(--handle "${{ inputs.handle }}")
          fi
          args+=(--max-items "$max_items")
          uv run python -m scripts.describe_media "${args[@]}"

      - name: extract video keyframes
        timeout-minutes: 20
        # ffmpeg ships preinstalled on ubuntu-latest. Capped at the same
        # max_items as the archive step so the runtime stays bounded; the
        # script caches by media_sha256, so re-runs are free. This also
        # writes tiny video thumbnails for the viewer's media column.
        run: |
          args=()
          max_items="${{ inputs.max_items }}"
          if [ -z "$max_items" ]; then
            max_items="80"
          fi
          if [ -n "${{ inputs.handle }}" ]; then
            args+=(--handle "${{ inputs.handle }}")
          fi
          args+=(--max-items "$max_items")
          uv run python -m scripts.extract_video_frames "${args[@]}"

      - name: OCR archived images and keyframes
        timeout-minutes: 20
        run: |
          args=()
          max_items="${{ inputs.max_items }}"
          if [ -z "$max_items" ]; then
            max_items="80"
          fi
          if [ -n "${{ inputs.handle }}" ]; then
            args+=(--handle "${{ inputs.handle }}")
          fi
          args+=(--max-items "$max_items")
          uv run python -m scripts.tag_image_ocr "${args[@]}"

      - name: detect audio music
        timeout-minutes: 20
        run: |
          args=()
          max_items="${{ inputs.max_items }}"
          if [ -z "$max_items" ]; then
            max_items="80"
          fi
          if [ -n "${{ inputs.handle }}" ]; then
            args+=(--handle "${{ inputs.handle }}")
          fi
          args+=(--max-items "$max_items")
          uv run python -m scripts.detect_audio_music "${args[@]}"

      - name: describe images and video keyframes with OpenAI
        timeout-minutes: 20
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_MEDIA_LLM_MODEL: ${{ vars.GEMINI_MEDIA_LLM_MODEL }}
          OPENAI_MEDIA_LLM_MODEL: ${{ vars.OPENAI_MEDIA_LLM_MODEL }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not configured; skipping paid media recognition"
            exit 0
          fi
          args=()
          llm_max_items="${{ inputs.llm_max_items }}"
          if [ -z "$llm_max_items" ]; then
            llm_max_items="20"
          fi
          llm_budget_usd="${{ inputs.llm_budget_usd }}"
          if [ -z "$llm_budget_usd" ]; then
            llm_budget_usd="2.00"
          fi
          if [ -n "${{ inputs.handle }}" ]; then
            args+=(--handle "${{ inputs.handle }}")
          fi
          args+=(--max-items "$llm_max_items")
          args+=(--budget-usd "$llm_budget_usd")
          uv run python -m scripts.tag_media_llm "${args[@]}"

      - name: refresh lexical tags
        run: uv run python -m scripts.tag_lexical

      - name: commit parquet updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            archived_handles=$(git diff --cached --name-only data/ | wc -l | tr -d ' ')
            git commit -m "[bot] archive: ${archived_handles} parquet(s) updated with media assets"
            git push
          else
            echo "no media updates"
          fi
