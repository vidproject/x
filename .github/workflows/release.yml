name: build-extension
on:
  push:
    # Build + commit the extension zips only on the default branch. This job
    # pushes regenerated extension.zip/extension-chrome.zip back to the repo,
    # which also feeds the Pages deploy; doing that per feature branch caused
    # redundant runs and stray bot commits on branches.
    branches: [master, main]
    paths:
      - '.github/workflows/release.yml'
      - 'extension/**'
      - 'scripts/build_extension.py'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-extension
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install node deps
        run: npm ci --no-audit --no-fund
      - name: build extension zip
        run: npm run build:extension
      - name: build Chrome extension zip
        run: npm run build:extension:chrome
      - name: upload extension zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension.zip
          path: extension.zip
          if-no-files-found: error
      - name: upload Chrome extension zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-chrome.zip
          path: extension-chrome.zip
          if-no-files-found: error
      - name: commit extension zips if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain extension.zip extension-chrome.zip)" ]; then
            git add extension.zip extension-chrome.zip
            git commit -m "[bot] build extension zips"
            git push
          else
            echo "extension zips unchanged"
          fi
